<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoFix Agent - Setup</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="w-full max-w-2xl px-4">
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-sky-500 rounded-xl flex items-center justify-center text-xl font-bold text-white mx-auto mb-3">AF</div>
    <h1 class="text-2xl font-bold">AutoFix Agent</h1>
    <p class="text-sm text-gray-500 mt-1">AI + WhaTap 연결 설정</p>
  </div>

  <div class="grid grid-cols-2 gap-4 mb-6">
    <!-- AI Provider -->
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 bg-purple-500 rounded-lg flex items-center justify-center text-white font-bold text-xs">AI</div>
        <div><div class="font-semibold text-sm">AI 제공자</div><div class="text-xs text-gray-400">분석 엔진</div></div>
        <span id="ai-dot" class="ml-auto w-2.5 h-2.5 rounded-full bg-gray-300"></span>
      </div>
      <select id="ai-provider" onchange="switchAiProvider()" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-purple-500 outline-none mb-3">
        <option value="sessioncast">SessionCast Relay</option>
        <option value="glm">GLM (Zhipu AI)</option>
      </select>
      <!-- SessionCast Panel -->
      <div id="ai-panel-sessioncast">
        <input type="text" id="inp-sc-token" placeholder="srt_live_xxx or srt_test_xxx" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-purple-500 outline-none mb-2">
        <button onclick="connectSC()" class="w-full border border-purple-400 text-purple-600 hover:bg-purple-50 py-2 rounded-lg text-xs font-medium transition">토큰으로 연결</button>
      </div>
      <!-- GLM Panel -->
      <div id="ai-panel-glm" class="hidden space-y-2">
        <input type="text" id="inp-glm-token" placeholder="GLM API Token" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-purple-500 outline-none">
        <input type="text" id="inp-glm-url" placeholder="https://open.bigmodel.cn/api/coding/paas/v4" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-purple-500 outline-none">
        <button onclick="connectGlm()" class="w-full border border-purple-400 text-purple-600 hover:bg-purple-50 py-2 rounded-lg text-xs font-medium transition">토큰으로 연결</button>
      </div>
      <div id="ai-status" class="hidden mt-3 bg-green-50 border border-green-200 rounded-lg p-2 text-xs text-green-700">
        <div class="font-medium">연결됨</div>
      </div>
      <div id="ai-msg" class="mt-2 text-xs text-gray-400">선택 사항 — 미연결 시 규칙 기반 분석</div>
    </div>

    <!-- WhaTap -->
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">WT</div>
        <div><div class="font-semibold text-sm">WhaTap</div><div class="text-xs text-gray-400">모니터링</div></div>
        <span id="wt-dot" class="ml-auto w-2.5 h-2.5 rounded-full bg-gray-300"></span>
      </div>
      <div class="flex border-b mb-3">
        <button onclick="switchWtTab('email')" class="tab-btn active text-xs py-1 px-3" id="wt-tab-email">이메일/비밀번호</button>
        <button onclick="switchWtTab('apikey')" class="tab-btn text-xs py-1 px-3" id="wt-tab-apikey">API Key</button>
      </div>
      <div id="wt-panel-email" class="space-y-2">
        <input type="email" id="inp-email" placeholder="user@example.com" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 outline-none">
        <input type="password" id="inp-pw" placeholder="비밀번호" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
      <div id="wt-panel-apikey" class="space-y-2 hidden">
        <input type="text" id="inp-apikey" placeholder="API Key" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 outline-none">
        <input type="text" id="inp-pcode" placeholder="pcode" class="w-full border rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
      <button id="btn-login" onclick="doLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg text-xs font-medium transition mt-3">로그인</button>
      <div id="wt-terminal" class="terminal rounded-lg p-2 mt-2 hidden text-xs max-h-16 overflow-auto"></div>
      <div id="wt-status" class="hidden mt-2 bg-green-50 border border-green-200 rounded-lg p-2 text-xs text-green-700"></div>
      <div id="login-msg" class="mt-2 text-xs text-gray-400"></div>
    </div>
  </div>

  <div class="text-center">
    <a id="continue-btn" href="#" class="inline-block bg-gray-300 text-gray-500 px-10 py-3 rounded-lg font-semibold transition no-underline pointer-events-none">계속</a>
    <p class="text-xs text-gray-400 mt-3">WhaTap 연결 필수 · AI 제공자는 선택 사항</p>
  </div>
</div>

<script>
let aiOk = false, wtOk = false;

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function checkReady() {
  const btn = document.getElementById('continue-btn');
  if (wtOk) {
    btn.className = 'inline-block bg-sky-500 hover:bg-sky-600 text-white px-10 py-3 rounded-lg font-semibold transition no-underline';
    btn.style.pointerEvents = 'auto';
    btn.href = 'select.html';
  }
}

function switchAiProvider() {
  const provider = document.getElementById('ai-provider').value;
  document.getElementById('ai-panel-sessioncast').classList.toggle('hidden', provider !== 'sessioncast');
  document.getElementById('ai-panel-glm').classList.toggle('hidden', provider !== 'glm');
  document.getElementById('ai-status').classList.add('hidden');
  document.getElementById('ai-dot').className = 'ml-auto w-2.5 h-2.5 rounded-full bg-gray-300';
  aiOk = false;
}

async function connectSC() {
  const token = document.getElementById('inp-sc-token').value;
  const msg = document.getElementById('ai-msg');
  if (!token) { msg.textContent = 'API 토큰을 입력하세요'; msg.style.color = '#dc2626'; return; }
  msg.textContent = '연결 중...'; msg.style.color = '#3b82f6';
  try {
    const r = await fetch('/api/auth/sessioncast/connect', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token}) });
    const d = await r.json();
    if (d.success) {
      aiOk = true;
      msg.textContent = '';
      document.getElementById('ai-dot').className = 'ml-auto w-2.5 h-2.5 rounded-full bg-green-500';
      document.getElementById('ai-status').classList.remove('hidden');
      // Save provider setting
      await fetch('/api/settings/ai', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({provider:'claude-code'}) });
    } else {
      msg.textContent = d.error || '연결 실패'; msg.style.color = '#dc2626';
    }
  } catch(e) { msg.textContent = '서버 연결 실패'; msg.style.color = '#dc2626'; }
}

async function connectGlm() {
  const token = document.getElementById('inp-glm-token').value;
  const url = document.getElementById('inp-glm-url').value || 'https://open.bigmodel.cn/api/coding/paas/v4';
  const msg = document.getElementById('ai-msg');
  if (!token) { msg.textContent = 'GLM API 토큰을 입력하세요'; msg.style.color = '#dc2626'; return; }
  msg.textContent = '연결 테스트 중...'; msg.style.color = '#3b82f6';
  try {
    // Test connection
    const r = await fetch('/api/settings/ai/glm/test', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({glmApiToken: token, glmBaseUrl: url}) });
    const d = await r.json();
    if (d.success) {
      aiOk = true;
      msg.textContent = '';
      document.getElementById('ai-dot').className = 'ml-auto w-2.5 h-2.5 rounded-full bg-green-500';
      document.getElementById('ai-status').classList.remove('hidden');
      // Save provider setting
      await fetch('/api/settings/ai', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({provider:'glm', model:'glm-5', glmApiToken: token, glmBaseUrl: url}) });
    } else {
      msg.textContent = d.error || '연결 실패'; msg.style.color = '#dc2626';
    }
  } catch(e) { msg.textContent = '서버 연결 실패'; msg.style.color = '#dc2626'; }
}

function switchWtTab(tab) {
  document.getElementById('wt-tab-email').classList.toggle('active', tab==='email');
  document.getElementById('wt-tab-apikey').classList.toggle('active', tab==='apikey');
  document.getElementById('wt-panel-email').classList.toggle('hidden', tab!=='email');
  document.getElementById('wt-panel-apikey').classList.toggle('hidden', tab!=='apikey');
}

async function doLogin() {
  const activeTab = document.getElementById('wt-tab-email').classList.contains('active') ? 'email' : 'apikey';
  const msg = document.getElementById('login-msg');
  const term = document.getElementById('wt-terminal');
  const btn = document.getElementById('btn-login');

  if (activeTab === 'apikey') {
    const apikey = document.getElementById('inp-apikey').value;
    const pcode = document.getElementById('inp-pcode').value;
    if (!apikey || !pcode) { msg.textContent = 'API Key와 pcode를 입력하세요'; msg.style.color = '#dc2626'; return; }
    btn.disabled = true;
    try {
      await fetch('/api/auth/whatap/select-project', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pcode: parseInt(pcode), projectApiToken: apikey, projectName: 'Direct (pcode: ' + pcode + ')'}) });
      wtOk = true;
      document.getElementById('wt-dot').className = 'ml-auto w-2.5 h-2.5 rounded-full bg-green-500';
      document.getElementById('wt-status').classList.remove('hidden');
      document.getElementById('wt-status').innerHTML = '<div class="font-medium">연결됨 (pcode: ' + esc(pcode) + ')</div>';
      sessionStorage.setItem('af_project_name', 'Direct (pcode: ' + pcode + ')');
      // Direct API key mode — go straight to monitor
      document.getElementById('continue-btn').href = 'monitor.html';
      checkReady();
    } catch(e) { msg.textContent = '연결 실패'; msg.style.color = '#dc2626'; }
    btn.disabled = false;
    return;
  }

  const email = document.getElementById('inp-email').value;
  const pw = document.getElementById('inp-pw').value;
  if (!email || !pw) { msg.textContent = '이메일과 비밀번호를 입력하세요'; msg.style.color = '#dc2626'; return; }

  btn.disabled = true;
  term.classList.remove('hidden');
  term.innerHTML = '<div class="text-gray-500">$ whatap login -e ' + esc(email) + ' -p ****</div>';

  try {
    const r = await fetch('/api/auth/whatap/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password: pw}) });
    const d = await r.json();
    if (d.success) {
      term.innerHTML += '<div class="text-green-400">로그인 성공. ' + (d.projects || []).length + '개 프로젝트 발견.</div>';
      sessionStorage.setItem('af_projects', JSON.stringify(d.projects || []));
      wtOk = true;
      document.getElementById('wt-dot').className = 'ml-auto w-2.5 h-2.5 rounded-full bg-green-500';
      document.getElementById('wt-status').classList.remove('hidden');
      document.getElementById('wt-status').innerHTML = '<div class="font-medium">로그인 완료: ' + esc(email) + '</div>';
      checkReady();
    } else {
      term.innerHTML += '<div class="text-red-400">로그인 실패: ' + esc(d.error || d.message || '') + '</div>';
    }
  } catch(e) {
    term.innerHTML += '<div class="text-red-400">오류: ' + esc(e.message) + '</div>';
  }
  btn.disabled = false;
}

// Auto-connect check on page load
(async function() {
  // AI Provider 상태 확인
  try {
    // Check existing AI settings
    const r = await fetch('/api/settings/ai');
    const d = await r.json();
    if (d.provider === 'glm' && d.hasGlmToken === 'true') {
      aiOk = true;
      document.getElementById('ai-provider').value = 'glm';
      switchAiProvider();
      document.getElementById('ai-dot').className = 'ml-auto w-2.5 h-2.5 rounded-full bg-green-500';
      document.getElementById('ai-status').classList.remove('hidden');
      document.getElementById('inp-glm-token').value = '(저장됨)';
      document.getElementById('ai-msg').textContent = '';
    } else {
      // Check SessionCast status
      const sc = await fetch('/api/auth/sessioncast/status');
      const sd = await sc.json();
      if (sd.connected) {
        aiOk = true;
        document.getElementById('ai-dot').className = 'ml-auto w-2.5 h-2.5 rounded-full bg-green-500';
        document.getElementById('ai-status').classList.remove('hidden');
        document.getElementById('inp-sc-token').value = '(로컬 CLI 토큰 자동 연결)';
        document.getElementById('inp-sc-token').disabled = true;
        document.getElementById('ai-msg').textContent = '';
      }
    }
  } catch(e) {}
  // WhaTap 상태 확인
  try {
    const r = await fetch('/api/auth/whatap/status');
    const d = await r.json();
    if (d.connected) location.href = 'monitor.html';
  } catch(e) {}
})();
</script>
</body>
</html>
